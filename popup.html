<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrameRate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- SVG Noise Texture Filter -->
  <svg class="noise-svg" xmlns="http://www.w3.org/2000/svg">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise)" opacity="0.05"/>
  </svg>

  <div class="extension-container">

    <!-- ═══════════════════════════════════════════ -->
    <!-- BRAND HEADER                                 -->
    <!-- ═══════════════════════════════════════════ -->
    <header class="brand-header">
      <div class="brand-logo">
        <div class="brand-dot"></div>
        <span class="brand-name">FRAMERATE</span>
      </div>
      <div class="brand-model">PC — 4K</div>
    </header>

    <!-- ═══════════════════════════════════════════ -->
    <!-- FREQUENCY SLIDER (Scroll Percentage)         -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="frequency-slider neumorph-inset">
      <div class="freq-ticks" id="freqTicks">
        <!-- Ticks generated by JS -->
      </div>
      <div class="freq-needle" id="freqNeedle"></div>
      <div class="freq-labels">
        <span>0</span>
        <span>25</span>
        <span>50</span>
        <span>75</span>
        <span>100</span>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- ACOUSTIC GRILL (Decorative Element)          -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="acoustic-grill" id="acousticGrill">
      <!-- 10x10 grid of dots generated by CSS grid -->
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- MASTER DIAL (Main Action Button)             -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="dial-section">
      <button class="master-dial neumorph-flat" id="masterDial" aria-label="Start Capture">
        <div class="dial-bezel">
          <div class="dial-inner">
            <div class="dial-icon" id="dialIcon">
              <div class="rec-dot" id="recDot"></div>
              <span class="dial-label" id="dialLabel">REC</span>
            </div>
          </div>
        </div>
      </button>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- TACTILE MODE SWITCHES                        -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="mode-switches">
      <button class="mode-btn neumorph-flat" data-mode="shot" id="btnShot">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2" ry="2"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="18" cy="7" r="1" fill="currentColor"/>
          </svg>
        </div>
        <span class="mode-label">Shot</span>
        <div class="mode-tooltip">Instantly captures a screenshot of your current tab.</div>
      </button>
      <button class="mode-btn neumorph-flat active" data-mode="seq" id="btnSeq">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
        </div>
        <span class="mode-label">Seq</span>
        <div class="mode-tooltip">Auto-scrolls & downloads sequential frames of the page.</div>
      </button>
      <button class="mode-btn neumorph-flat" data-mode="vid" id="btnVid">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="15" height="16" rx="2"/>
            <polygon points="22,6 17,12 22,18"/>
          </svg>
        </div>
        <span class="mode-label">Vid</span>
        <div class="mode-tooltip">Records a smooth 60fps video. Press Alt+S to stop.</div>
      </button>
      <button class="mode-btn neumorph-flat" data-mode="smooth" id="btnSmooth">
        <div class="mode-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4,18 8,12 12,14 16,8 20,4"/>
            <line x1="4" y1="4" x2="4" y2="20"/><line x1="4" y1="20" x2="20" y2="20"/>
          </svg>
        </div>
        <span class="mode-label">Full screen vid</span>
        <div class="mode-tooltip">Records a smooth auto-scrolling walkthrough video.</div>
      </button>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- STATUS DISPLAY                               -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="status-display neumorph-inset" id="statusDisplay">
      <div class="status-row status-main">
        <span class="status-indicator" id="statusIndicator"></span>
        <span class="status-mode" id="statusMode">SEQ</span>
        <span class="status-separator">│</span>
        <span class="status-res" id="statusRes">4K</span>
        <span class="status-separator">│</span>
        <span class="status-fps" id="statusFps">60FPS</span>
      </div>
      <div class="status-row status-timer">
        <span class="timer-display" id="timerDisplay">00:00:00</span>
      </div>
      <div class="status-row status-info">
        <span class="status-msg" id="statusMsg">Ready — Select mode & press REC</span>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- SETTINGS ROW                                 -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="settings-row">
      <div class="setting-group">
        <label class="setting-label">Quality</label>
        <div class="setting-value neumorph-inset">
          <select id="qualitySelect">
            <option value="max" selected>Maximum</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
          </select>
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-label">Speed</label>
        <div class="setting-value neumorph-inset">
          <select id="scrollSpeedSelect">
            <option value="1">Slow</option>
            <option value="2" selected>Normal</option>
            <option value="4">Fast</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- FOOTER                                       -->
    <!-- ═══════════════════════════════════════════ -->
    <footer class="extension-footer">
      <img src="icons/icon16.png" alt="Logo" class="footer-icon">
      <span class="footer-text">FrameRate v1.0</span>
      <div class="footer-dots">
        <span class="f-dot"></span><span class="f-dot"></span><span class="f-dot"></span>
      </div>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
